<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2004scape Combat Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:var(--bg-0, #0e0e12); }
  #root { width:100vw; height:100vh; display:flex; flex-direction:column; }
  /* .sim uses height:100% — give it a proper flex context */
  #root > div { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
</style>
</head>
<body>
<div id="root"></div>

<!-- engine (attaches window.SimEngine + window.GameData) -->
<script src="gamedata.js"></script>
<script src="engine.js"></script>
<script src="trip.js"></script>
<script src="equipment.js"></script>
<script src="market.js"></script>
<script src="planner-core.js"></script>

<!-- views (babel JSX) — defines CombatWorkbench, CombatSpreadsheet, etc. -->
<script type="text/babel" src="planner.jsx"></script>
<script type="text/babel" src="views.jsx"></script>

<script type="text/babel" data-presets="react">
// Error boundary — shows the actual crash instead of a black page.
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state = { err: null, info: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ this.setState({ info }); console.error('[CombatWorkbench crash]', err, info); }
  render(){
    if (this.state.err) {
      const err = this.state.err;
      return (
        <div style={{padding:'24px', fontFamily:'monospace', fontSize:13, color:'#f0d0d0',
          background:'#1a1012', height:'100vh', overflow:'auto', boxSizing:'border-box'}}>
          <div style={{fontSize:15, color:'#ff8888', marginBottom:12}}>⚠ CombatWorkbench crashed on render</div>
          <div style={{fontSize:16, color:'#ffcc66', marginBottom:16, padding:'10px 12px',
            background:'#2a1d10', borderRadius:4, whiteSpace:'pre-wrap'}}>
            {err ? ((err.name||'Error') + ': ' + (err.message||String(err))) : 'unknown'}
          </div>
          <div style={{color:'#c0a0a0', fontSize:11, whiteSpace:'pre-wrap', marginBottom:16}}>{err && err.stack}</div>
          <div style={{color:'#a08080', fontSize:11, whiteSpace:'pre-wrap'}}>{this.state.info && this.state.info.componentStack}</div>
          <button onClick={()=>this.setState({err:null,info:null})}
            style={{marginTop:16, padding:'6px 14px', cursor:'pointer'}}>Try again</button>
        </div>
      );
    }
    return this.props.children;
  }
}
function App() {
  return <ErrorBoundary><CombatWorkbench /></ErrorBoundary>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
